syntax = "proto3";

package user_service;

import "proto_validation/validate.proto";

option go_package = "BHLA/proto/user_service;user_servicePB";

enum UserRoles {
  UNAUTHORISED_USER = 0;
  FREE_PLAN_USER = 1;
  PRO_PLAN_USER = 2;
  ADMIN = 3;
}

service UserService {
  rpc UserRegistration(RegisterRequest) returns (RegisterResponse);
  rpc GetUserData(GetUserDataRequest) returns (GetUserDataResponse);
  rpc ChangeUserPlan(PlanChangeRequest) returns (PlanChangeResponse);
}

message User {
  string user_id = 1 [(validate.rules).string.uuid = true];

  string user_name = 2 [(validate.rules).string = {
    pattern: "^[A-Za-z]+( [A-Za-z]+)*$",
    min_len: 2,
    max_len: 128
  }];

  string user_password = 3 [(validate.rules).string = {

    pattern: "^[\\x21-\\x7E]+$",
    min_len: 8,
    max_len: 72
  }];

  UserRoles user_role = 4 [(validate.rules).enum = {defined_only: true, not_in: [0]}];
}

message UserData {
  string user_id = 1 [(validate.rules).string.uuid = true];

  string user_name = 2 [(validate.rules).string = {
    pattern: "^[A-Za-z]+( [A-Za-z]+)*$",
    min_len: 2,
    max_len: 128
  }];

  UserRoles user_role = 3 [(validate.rules).enum = {defined_only: true, not_in: [0]}];
}


message RegisterRequest {
  string user_name = 1 [(validate.rules).string = {
    pattern: "^[A-Za-z]+( [A-Za-z]+)*$",
    min_len: 2,
    max_len: 128
  }];

  string user_password = 2 [(validate.rules).string = {
    pattern: "^[\\x21-\\x7E]+$",
    min_len: 8,
    max_len: 72
  }];
}

message RegisterResponse {
  string user_name = 1;
  UserRoles user_role = 2 [(validate.rules).enum = {defined_only: true, not_in:[0]}];
}

message GetUserDataRequest {
  string user_id = 1 [(validate.rules).string.uuid = true];
}

message GetUserDataResponse {
  UserData user_data = 1;
}


message PlanChangeRequest {
  string user_id = 1 [(validate.rules).string.uuid = true];

  UserRoles user_role = 2 [(validate.rules).enum = {defined_only: true, not_in: [0]}];
}

message PlanChangeResponse {
  string user_id = 1 [(validate.rules).string.uuid = true];

  UserRoles user_role = 2 [(validate.rules).enum = {defined_only: true, not_in: [0]}];
}

