syntax = "proto3";

package user_service;

import "proto_validation/validate.proto";

option go_package = "BHLA/proto/auth_service";

enum UserRoles {
  UNAUTHORISED_USER = 0;
  FREE_PLAN_USER = 1;
  PRO_PLAN_USER = 2;
  ADMIN = 3;
}

service AuthService {
  rpc UserLogin(LoginRequest) returns (LoginResponse);
  rpc PlanChange(PlanChangeRequest) returns (PlanChangeResponse);
}

message LoginRequest {
  string user_name = 1 [(validate.rules).string = {
    pattern: "^[A-Za-z]+( [A-Za-z]+)*$",
    min_len: 2,
    max_len: 128
  }];

  string user_password = 2 [(validate.rules).string = {
    pattern: "^[\\x21-\\x7E]+$",
    min_len: 8,
    max_len: 72
  }];
}

// поставил пока сессию на uuid, если что пересоберу
message LoginResponse {
  string user_id = 1 [(validate.rules).string.uuid = true];
  string session_id = 2 [(validate.rules).string.uuid = true];
}

message PlanChangeRequest {
  string user_name = 1 [(validate.rules).string = {
    pattern: "^[A-Za-z]+( [A-Za-z]+)*$",
    min_len: 2,
    max_len: 128
  }];

  UserRoles user_role = 2 [(validate.rules).enum = {defined_only: true, not_in: [0]}];
}

message PlanChangeResponse {
  string user_name = 1 [(validate.rules).string = {
    pattern: "^[A-Za-z]+( [A-Za-z]+)*$",
    min_len: 2,
    max_len: 128
  }];

  UserRoles user_role = 2 [(validate.rules).enum = {defined_only: true, not_in: [0]}];
}

