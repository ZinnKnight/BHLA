syntax = "proto3";

package auth_service;

import "proto_validation/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "BHLA/proto/auth_service;auth_servicePB";

enum SessionState {
  SESSION_STATE_UNDEFINED = 0;
  SESSION_STATE_ACTIVE    = 1;
  SESSION_STATE_INACTIVE  = 2;
  SESSION_STATE_SUSPENDED = 3;
}

service AuthService {
  rpc UserLogin(LoginRequest) returns (LoginResponse);
}

message LoginRequest {
  string user_name = 1 [(validate.rules).string = {
    pattern: "^[A-Za-z]+( [A-Za-z]+)*$",
    min_len: 2,
    max_len: 128
  }];

  string user_password = 2 [(validate.rules).string = {
    pattern: "^[\\x21-\\x7E]+$",
    min_len: 8,
    max_len: 72
  }];
}

// поставил пока сессию на uuid, если что пересоберу
message LoginResponse {
  string user_id = 1 [(validate.rules).string.uuid = true];
  string session_id = 2 [(validate.rules).string.uuid = true];
}

message ValidateSessionRequest {
  string session_id = 1 [(validate.rules).string.uuid = true];
}

message ValidateSessionResponse {
  string session_id = 1 [(validate.rules).string.uuid = true];
  string user_id = 2 [(validate.rules).string.uuid = true];
  SessionState session_state = 3;
  google.protobuf.Timestamp ttl = 4;
}