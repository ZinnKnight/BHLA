name: bhla

x-svc-env: &svc-env
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/BHLA
  REDIS_ADDR: redis:6379
  KAFKA_BROKERS: kafka:9092
  SESSION_TTL_SECONDS: "3600"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: BHLA
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d BHLA"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["9092:9092"]
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrator:
    image: postgres:16-alpine
    depends_on:
      postgres: {condition: service_healthy}
    environment:
      PGPASSWORD: postgres
    volumes: [".:/repo:ro"]
    entrypoint:
      - sh
      - -c
      - 'for f in $$(ls /repo/services/*/migrations/*.up.sql | sort); do echo "applying $$f"; psql -h postgres -U postgres -d BHLA -f "$$f" || exit 1; done'

  auth-service:
    build: {context: ., dockerfile: Dockerfile, args: {SERVICE: auth-service}}
    environment: {<<: *svc-env, SERVICE_NAME: auth-service, GRPC_PORT: "50051", METRICS_PORT: "2112"}
    ports: ["50051:50051", "2112:2112"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrator: {condition: service_completed_successfully}

  user-service:
    build: {context: ., dockerfile: Dockerfile, args: {SERVICE: user-service}}
    environment: {<<: *svc-env, SERVICE_NAME: user-service, GRPC_PORT: "50052", METRICS_PORT: "2113"}
    ports: ["50052:50052", "2113:2113"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrator: {condition: service_completed_successfully}

  order-service:
    build: {context: ., dockerfile: Dockerfile, args: {SERVICE: order-service}}
    environment: {<<: *svc-env, SERVICE_NAME: order-service, GRPC_PORT: "50053", METRICS_PORT: "2114"}
    ports: ["50053:50053", "2114:2114"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
      migrator: {condition: service_completed_successfully}

  market-service:
    build: {context: ., dockerfile: Dockerfile, args: {SERVICE: market-service}}
    environment: {<<: *svc-env, SERVICE_NAME: market-service, GRPC_PORT: "50054", METRICS_PORT: "2115"}
    ports: ["50054:50054", "2115:2115"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
      migrator: {condition: service_completed_successfully}
